name: Build tdlib-obf Android

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout tdlib-obf
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf wget unzip tree default-jdk-headless

      - name: Download Android NDK r27c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip -O ndk.zip
          unzip -q ndk.zip

      - name: Fetch OpenSSL 3 (prebuilt for Android)
        run: |
          git clone --depth=1 https://github.com/KDAB/android_openssl.git
          echo "=== OpenSSL 3 arm64 structure ==="
          ls -laR android_openssl/ssl_3/arm64-v8a/

      - name: Build zlib 1.3.2 for Android
        run: |
          export ANDROID_NDK_HOME=$PWD/android-ndk-r27c
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          
          wget -q https://github.com/madler/zlib/releases/download/v1.3.2/zlib-1.3.2.tar.gz
          tar -xzf zlib-1.3.2.tar.gz
          cd zlib-1.3.2
          
          CC=aarch64-linux-android21-clang \
          CXX=aarch64-linux-android21-clang++ \
          AR=llvm-ar \
          RANLIB=llvm-ranlib \
          ./configure --prefix=$PWD/install --static
          
          make -j$(nproc)
          make install
          
          echo "ZLIB_ROOT=$PWD/install" >> $GITHUB_ENV

      # =====================================================================
      # ЭТАП 1: Хостовая сборка (генерация auto/*.cpp и прочих исходников)
      # =====================================================================
      - name: Host build (generate sources)
        run: |
          mkdir -p build-host && cd build-host
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTD_ENABLE_JNI=OFF \
            -DTD_SKIP_BENCHMARK=ON \
            -DTD_SKIP_TEST=ON \
            ..
          cmake --build . --parallel $(nproc) || true
          cd ..

      - name: Copy generated sources to source tree
        run: |
          mkdir -p tdutils/generate/auto td/generate/auto
          cp -r build-host/tdutils/generate/auto/* tdutils/generate/auto/ 2>/dev/null || true
          cp -r build-host/td/generate/auto/* td/generate/auto/ 2>/dev/null || true
          test -f tdutils/generate/auto/mime_type_to_extension.cpp || { echo "CRITICAL: generated files missing"; exit 1; }

      # =====================================================================
      # ПАТЧ: NDK r27c libc++ не поддерживает std::atomic<std::shared_ptr>
      # =====================================================================
      - name: Patch logging.cpp for NDK r27c libc++
        run: |
          python3 << 'PYEOF'
          with open('tdutils/td/utils/logging.cpp', 'r') as f:
              c = f.read()

          # Добавляем <mutex> если ещё нет
          if '#include <mutex>' not in c:
              c = c.replace('#include <atomic>', '#include <atomic>\n#include <mutex>')

          # Заменяем atomic<<shared_ptr> на shared_ptr + mutex
          c = c.replace(
              '''static std::atomic<std::shared_ptr<const LogMessageCallbackState>> log_message_callback_state{
              std::make_shared<const LogMessageCallbackState>(make_log_message_callback_state(-2, nullptr))};''',
              '''static std::shared_ptr<const LogMessageCallbackState> log_message_callback_state{
              std::make_shared<const LogMessageCallbackState>(make_log_message_callback_state(-2, nullptr))};
          static std::mutex log_message_callback_state_mutex;'''
          )

          # load — теперь под мьютексом
          c = c.replace(
              '''inline std::shared_ptr<const LogMessageCallbackState> load_log_message_callback_state() noexcept {
            return log_message_callback_state.load(std::memory_order_acquire);
          }''',
              '''inline std::shared_ptr<const LogMessageCallbackState> load_log_message_callback_state() noexcept {
            std::lock_guard<std::mutex> lock(log_message_callback_state_mutex);
            return log_message_callback_state;
          }'''
          )

          # store — теперь под мьютексом
          c = c.replace(
              '''inline void store_log_message_callback_state(int max_verbosity_level, OnLogMessageCallback callback) noexcept {
            log_message_callback_state.store(
                std::make_shared<const LogMessageCallbackState>(make_log_message_callback_state(max_verbosity_level, callback)),
                std::memory_order_release);
          }''',
              '''inline void store_log_message_callback_state(int max_verbosity_level, OnLogMessageCallback callback) noexcept {
            std::lock_guard<std::mutex> lock(log_message_callback_state_mutex);
            log_message_callback_state =
                std::make_shared<const LogMessageCallbackState>(make_log_message_callback_state(max_verbosity_level, callback));
          }'''
          )

          with open('tdutils/td/utils/logging.cpp', 'w') as f:
              f.write(c)
          print("logging.cpp patched successfully")
          PYEOF

      # =====================================================================
      # ЭТАП 2: Кросс-сборка под Android
      # =====================================================================
      - name: Build tdlib-obf for Android
        run: |
          export ANDROID_NDK_HOME=$PWD/android-ndk-r27c
          OPENSSL_DIR=$PWD/android_openssl/ssl_3
          OPENSSL_ABI_DIR=$OPENSSL_DIR/arm64-v8a
          
          mkdir -p build-android && cd build-android
          
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_NATIVE_API_LEVEL=21 \
            -DTD_ENABLE_JNI=ON \
            -DTDLIB_STEALTH_SHAPING=ON \
            -DOPENSSL_ROOT_DIR=$OPENSSL_DIR \
            -DOPENSSL_INCLUDE_DIR=$OPENSSL_DIR/include \
            -DOPENSSL_CRYPTO_LIBRARY=$OPENSSL_ABI_DIR/libcrypto.so \
            -DOPENSSL_SSL_LIBRARY=$OPENSSL_ABI_DIR/libssl.so \
            -DZLIB_ROOT=$ZLIB_ROOT \
            -DZLIB_LIBRARY=$ZLIB_ROOT/lib/libz.a \
            -DZLIB_INCLUDE_DIR=$ZLIB_ROOT/include \
            ..
          
          cmake --build . --parallel $(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-obf-arm64
          path: |
            build-android/libtdjson.so
            build-android/libtdjsonandroid.so
            build-android/*.so
