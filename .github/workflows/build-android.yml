name: Build tdlib-obf Android

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout tdlib-obf
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf zlib1g-dev wget unzip

      - name: Download Android NDK r26c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26c-linux.zip -O ndk.zip
          unzip -q ndk.zip
          ls android-ndk-r26c/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++
          ./android-ndk-r26c/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++ --version

      - name: Fetch OpenSSL (prebuilt for Android)
        run: |
          git clone --depth=1 https://github.com/KDAB/android_openssl.git
          ls android_openssl/ssl_3/

      - name: Build tdlib-obf
        run: |
          export ANDROID_NDK_HOME=$PWD/android-ndk-r26c
          mkdir build && cd build
          
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_NATIVE_API_LEVEL=21 \
            -DTD_ENABLE_JNI=ON \
            -DOPENSSL_ROOT_DIR=$PWD/../android_openssl/ssl_3/arm64-v8a \
            ..
          
          cmake --build . --parallel $(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-obf-arm64
          path: build/libtdjson.so
