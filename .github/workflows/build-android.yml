name: Build tdlib-obf Android

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout tdlib-obf
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf wget unzip tree

      - name: Download Android NDK r27c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip -O ndk.zip
          unzip -q ndk.zip

      - name: Fetch OpenSSL (prebuilt for Android)
        run: |
          git clone --depth=1 https://github.com/KDAB/android_openssl.git
          echo "=== Структура android_openssl ==="
          tree android_openssl/ || find android_openssl/ -type f | head -50
          echo "=== Конкретно ssl_3 ==="
          ls -laR android_openssl/ssl_3/ || echo "Директории ssl_3 нет!"

      - name: Build zlib 1.3.2 for Android
        run: |
          export ANDROID_NDK_HOME=$PWD/android-ndk-r27c
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          
          wget -q https://github.com/madler/zlib/releases/download/v1.3.2/zlib-1.3.2.tar.gz
          tar -xzf zlib-1.3.2.tar.gz
          cd zlib-1.3.2
          
          CC=aarch64-linux-android21-clang \
          CXX=aarch64-linux-android21-clang++ \
          AR=llvm-ar \
          RANLIB=llvm-ranlib \
          ./configure --prefix=$PWD/install --static
          
          make -j$(nproc)
          make install
          
          echo "ZLIB_ROOT=$PWD/install" >> $GITHUB_ENV

      - name: Build tdlib-obf
        run: |
          # Найдём реальные пути к OpenSSL автоматически
          OPENSSL_BASE=$(find $PWD/android_openssl -name "libcrypto.so" -o -name "libcrypto.a" | head -1 | xargs dirname || echo "")
          echo "OpenSSL lib dir: $OPENSSL_BASE"
          
          if [ -z "$OPENSSL_BASE" ] || [ "$OPENSSL_BASE" = "." ]; then
            echo "OpenSSL не найден! Проверьте структуру выше."
            exit 1
          fi
          
          export ANDROID_NDK_HOME=$PWD/android-ndk-r27c
          mkdir build && cd build
          
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_NATIVE_API_LEVEL=21 \
            -DTD_ENABLE_JNI=ON \
            -DOPENSSL_ROOT_DIR=$(dirname $OPENSSL_BASE) \
            -DOPENSSL_INCLUDE_DIR=$(dirname $OPENSSL_BASE)/include \
            -DOPENSSL_CRYPTO_LIBRARY=$OPENSSL_BASE/libcrypto.so \
            -DOPENSSL_SSL_LIBRARY=$OPENSSL_BASE/libssl.so \
            -DZLIB_ROOT=$ZLIB_ROOT \
            -DZLIB_LIBRARY=$ZLIB_ROOT/lib/libz.a \
            -DZLIB_INCLUDE_DIR=$ZLIB_ROOT/include \
            ..
          
          cmake --build . --parallel $(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-obf-arm64
          path: build/libtdjson.so
